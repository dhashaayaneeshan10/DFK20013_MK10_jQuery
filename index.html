<!DOCTYPE html>
<html>
<head>
<title>Login System</title>

<link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

<script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
<script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

<script src="script.js"></script>

</head>

<body>

<!-- PAGE 1 : LOGIN -->
<div data-role="page" id="page1" data-theme="b">

    <div data-role="header" data-theme="a">
        <h1>Login System</h1>
    </div>

    <div role="main" class="ui-content">

        <!-- LOGIN CARD -->
        <div data-role="collapsible" data-collapsed="false" data-theme="a">

            <h3>User Login</h3>

            <div class="ui-field-contain">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>

            <div class="ui-field-contain">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <button onclick="login()" data-icon="check" data-theme="b">
                Login
            </button>

        </div>

    </div>

    <!-- POPUP -->
    <div data-role="popup" id="loginPopup" data-theme="b">

        <div data-role="header" data-theme="a">
            <h1>Warning</h1>
        </div>

        <div role="main" class="ui-content">
            <p>Please enter username & password</p>
            <a href="#" data-rel="back" class="ui-btn ui-btn-b ui-icon-check ui-btn-icon-left">
                OK
            </a>
        </div>

    </div>

</div>


<!-- PAGE 2 : AFTER LOGIN -->
<div data-role="page" id="page2" data-theme="b">

    <div data-role="header" data-theme="a">
        <h1>User Information</h1>
    </div>

    <div role="main" class="ui-content">

        <div data-role="collapsible" data-collapsed="false" data-theme="a">
            <h3>Welcome</h3>

            <p>You have successfully logged in.</p>

            <a href="#page1" class="ui-btn ui-btn-b ui-icon-home ui-btn-icon-left">
                Logout
            </a>

        </div>

    </div>

</div>

</body>
</html>
